<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Iglesia Amistad Fuertes - Ministerio Kids</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet"/>

<style>
:root {
  --p: #1A1A1A;
  --pl: #2E2E2E;
  --pd: #0D0D0D;

  --a1: #444444;
  --a2: #888888;
  --a3: #BDBDBD;
  --a4: #E0E0E0;

  --bg: #F5F5F5;
  --bg2: #EBEBEB;

  --card: #FFFFFF;

  --txt: #111111;
  --muted: #777777;
  --border: #E0E0E0;

  --sh: 0 4px 20px rgba(0,0,0,.08);
  --sh2: 0 10px 40px rgba(0,0,0,.12);

  --r: 18px; --rsm: 10px; --rlg: 26px;

  --fn: 'Nunito', sans-serif;
  --fd: 'Fredoka One', cursive;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--fn);background:var(--bg);color:var(--txt);overflow-x:hidden}

/* SCREENS */
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* LOGIN */
#s-login{
  background:linear-gradient(145deg,#000000 0%,#1A1A1A 50%,#2E2E2E 100%);
  align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;
}
.orb{position:absolute;border-radius:50%;filter:blur(60px);opacity:.25;pointer-events:none}
.orb1{width:320px;height:320px;background:#333;top:-80px;right:-80px}
.orb2{width:240px;height:240px;background:#555;bottom:60px;left:-60px}
.orb3{width:180px;height:180px;background:#777;bottom:-40px;right:100px}

.login-card{
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.1);
  box-shadow:0 30px 70px rgba(0,0,0,.5);
}

/* HEADER */
.topbar{
  background:linear-gradient(110deg,#000,#1A1A1A);
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}

/* BOTONES */
.btn-login{
  background:linear-gradient(135deg,#444,#777);
  color:#fff;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
.btn-login:hover{box-shadow:0 8px 30px rgba(0,0,0,.5)}

.btn-search{
  background:#1A1A1A;
}
.btn-search:hover{background:#000}

.btn-add{
  background:linear-gradient(135deg,#444,#888);
}

.btn-save{
  background:linear-gradient(135deg,#000,#2E2E2E);
}

/* TARJETAS */
.mcard:hover:not(.locked){
  border-color:#333;
}

.mcard-icon.c1{background:#EDEDED}
.mcard-icon.c2{background:#E0E0E0}
.mcard-icon.c3{background:#D6D6D6}
.mcard-icon.c4{background:#CCCCCC}

/* FOTO */
.photo-thumb.filled{border-color:#1A1A1A}

/* ADULTOS */
.btn-rm{color:#555}

/* FOUND BOX */
.found-box{
  background:linear-gradient(135deg,#F0F0F0,#E0E0E0);
  border:2px solid #BDBDBD;
}
.found-box strong{color:#111}
.found-box span{color:#444}

/* RECORDS */
.rec-card:hover{
  border-color:#333;
}

/* TOAST */
.toast.ok{background:#111}
.toast.err{background:#444}
.toast.inf{background:#222}

/* LOADER */
.loader{background:rgba(0,0,0,.7)}

</style>
</head>

<body>
