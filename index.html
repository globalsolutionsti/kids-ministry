<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Iglesia Amistad Fuertes - Ministerio Kids</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#F5F5F5;
  --bg2:#EDEDED;
  --card:#FFFFFF;

  --black:#0F0F0F;
  --dark:#1A1A1A;
  --gray:#666;
  --light-gray:#BDBDBD;

  --border:#E0E0E0;

  --primary:#111111;
  --primary-light:#2A2A2A;

  --radius:14px;
  --shadow:0 6px 24px rgba(0,0,0,.08);

  --font:'Nunito', sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--black)}

/* screens */
.screen{display:none;min-height:100vh}
.screen.active{display:block}

/* LOGIN */
#s-login{
  display:flex;align-items:center;justify-content:center;
  background:var(--dark);
}

.login-card{
  background:var(--card);
  padding:40px;
  border-radius:var(--radius);
  width:100%;max-width:360px;
  box-shadow:var(--shadow);
}

.logo-name{
  font-size:28px;
  font-weight:800;
  text-align:center;
  margin-bottom:6px;
}
.logo-tag{
  text-align:center;
  color:var(--gray);
  font-size:13px;
  margin-bottom:25px;
}

input{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid var(--border);
  margin-bottom:12px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:8px;
  background:var(--primary);
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

button:hover{background:var(--primary-light)}

/* HEADER */
.topbar{
  background:var(--black);
  color:#fff;
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.btn-out{
  background:transparent;
  border:1px solid #444;
  padding:6px 12px;
  color:#fff;
}

/* MENU */
.menu-body{padding:20px}

.menu-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.mcard{
  background:var(--card);
  padding:20px;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  cursor:pointer;
}

.mcard:hover{transform:translateY(-2px)}

.mcard h4{font-size:14px;margin-bottom:6px}
.mcard p{font-size:12px;color:var(--gray)}

.locked{opacity:.5}

/* DB */
.db-scroll{padding:16px;max-width:800px;margin:auto}

.panel{
  background:var(--card);
  border-radius:var(--radius);
  padding:20px;
  margin-bottom:16px;
  box-shadow:var(--shadow);
}

.panel-title{
  font-weight:800;
  margin-bottom:12px;
}

.finput{
  width:100%;
  padding:10px;
  border:1px solid var(--border);
  border-radius:8px;
}

.btn-save{
  margin-top:10px;
}

/* records */
.rec-card{
  background:var(--card);
  border-radius:var(--radius);
  padding:12px;
  box-shadow:var(--shadow);
  margin-bottom:10px;
}

.rec-date{
  font-size:11px;
  color:var(--gray);
}

/* toast */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  color:#fff;
  padding:10px 20px;
  border-radius:20px;
}

/* loader */
.loader{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
}

.hidden{display:none!important}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="s-login" class="screen active">
  <div class="login-card">
    <div class="logo-name">Ministerio Kids</div>
    <div class="logo-tag">Sistema de Registro</div>

    <input id="l-user" placeholder="Usuario" value="admin"/>
    <input id="l-pass" type="password" placeholder="Contraseña" value="admin123"/>

    <button onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- MENU -->
<div id="s-menu" class="screen">
  <div class="topbar">
    <div>KidsMin</div>
    <button class="btn-out" onclick="doLogout()">Salir</button>
  </div>

  <div class="menu-body">
    <div class="menu-grid">
      <div class="mcard" onclick="goDb()">
        <h4>Base de Datos</h4>
        <p>Registro de niños</p>
      </div>
      <div class="mcard locked">
        <h4>Check-In</h4>
        <p>Próximamente</p>
      </div>
    </div>
  </div>
</div>

<!-- DB -->
<div id="s-db" class="screen">
  <div class="topbar">
    <button class="btn-out" onclick="goMenu()">Menú</button>
    <button class="btn-out" onclick="doLogout()">Salir</button>
  </div>

  <div class="db-scroll">

    <div class="panel">
      <div class="panel-title">Datos del niño</div>
      <input id="kid-name" class="finput" placeholder="Nombre"/>
      <input id="kid-age" class="finput" placeholder="Edad"/>
      <button class="btn-save" onclick="saveRecord()">Guardar</button>
    </div>

    <div id="rec-grid"></div>

  </div>
</div>

<div id="toast" class="toast hidden"></div>
<div id="loader" class="loader hidden">Procesando...</div>

<script>
let user=null;
let allRecs=[];

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function doLogin(){
  const u=l-user.value;
  const p=l-pass.value;
  if(u==='admin'&&p==='admin123'){
    user={};
    show('s-menu');
  }else toast('Error');
}

function doLogout(){show('s-login')}

function goMenu(){show('s-menu')}

function goDb(){
  show('s-db');
  renderRecs();
}

function saveRecord(){
  const name=document.getElementById('kid-name').value;
  const age=document.getElementById('kid-age').value;

  if(!name||!age){toast('Completa datos');return;}

  allRecs.push({
    nombre:name,
    edad:age,
    fecha:new Date()
  });

  renderRecs();
  toast('Guardado');
}

function renderRecs(){
  const g=document.getElementById('rec-grid');
  g.innerHTML=allRecs.map(r=>`
    <div class="rec-card">
      <strong>${r.nombre}</strong><br>
      Edad: ${r.edad}<br>
      <span class="rec-date">${r.fecha.toLocaleDateString()}</span>
    </div>
  `).join('');
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.remove('hidden');
  setTimeout(()=>t.classList.add('hidden'),2000);
}
</script>

</body>
</html>
